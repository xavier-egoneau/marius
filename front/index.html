<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Marius</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- ── nav bar ───────────────────────────────────────────────── -->
  <nav id="nav">
    <span id="nav-logo">M</span>
    <span id="nav-breadcrumb"></span>
    <div id="nav-actions"></div>
    <button class="nav-btn" id="btn-settings" title="settings">⚙</button>
  </nav>

  <!-- ── tab strip ─────────────────────────────────────────────── -->
  <div id="tabs">
    <button class="tab" data-view="agents">AGENTS</button>
    <button class="tab" data-view="control">CONTROL</button>
    <button class="tab" data-view="tasks">TASK.BOARD</button>
    <button class="tab" data-view="routines">ROUTINES.CRON</button>
    <button class="tab" data-view="skills">SKILLS</button>
  </div>

  <!-- ── views ─────────────────────────────────────────────────── -->
  <main id="view-agents" class="view"></main>
  <main id="view-control" class="view"></main>
  <main id="view-tasks" class="view"></main>
  <main id="view-routines" class="view"></main>
  <main id="view-skills" class="view skills-view"></main>

</div>

<!-- ── modal shell ───────────────────────────────────────────── -->
<div id="modal-overlay" class="hidden">
  <div id="modal">
    <div id="modal-header">
      <span id="modal-title"></span>
      <button id="modal-close">✕</button>
    </div>
    <div id="modal-body"></div>
    <div id="modal-footer"></div>
  </div>
</div>

<!-- ── chat overlay ──────────────────────────────────────────── -->
<div id="chat-overlay" class="hidden">
  <div id="chat-panel">
    <div id="chat-header">
      <span class="dot" id="chat-status-dot"></span>
      <span id="chat-agent-name"></span>
      <span id="chat-status-msg" style="color:var(--dim);font-size:12px;margin-left:8px"></span>
      <span style="flex:1"></span>
      <button id="chat-close">✕</button>
    </div>
    <div id="chat-body">
      <div id="chat-loading">
        <div class="chat-spinner"></div>
        <span id="chat-loading-msg">Démarrage du canal web…</span>
      </div>
      <iframe id="chat-frame" src="" frameborder="0" style="display:none"></iframe>
    </div>
  </div>
</div>

<!-- ── toast ─────────────────────────────────────────────────── -->
<div id="toast"></div>

<script src="app.js"></script>
</body>
</html>
