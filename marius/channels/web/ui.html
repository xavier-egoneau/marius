<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Marius</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  color-scheme: dark;
  --bg:      #141210;
  --panel:   #1a1714;
  --line:    #2a2520;
  --soft:    #8f8276;
  --text:    #ddd8d0;
  --bright:  #f0ebe3;
  --accent:  #d97706;
  --user-bg: #1f1510;
  --err:     #ef4444;
  --ok:      #22c55e;
}
body {
  font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  font-size: 14px;
}

/* ── header ──────────────────────────────────────────────────────── */
#header {
  min-height: 50px; padding: 10px 18px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
#status {
  width: 7px; height: 7px; border-radius: 50%;
  background: #3a3530;
  transition: background .3s, box-shadow .3s;
  flex-shrink: 0;
}
#status.on   { background: var(--accent); box-shadow: 0 0 5px #d9770655; }
#status.busy { animation: pulse 1s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
#agent-label { color: var(--soft); font-size: 12px; }
#model-label  { color: var(--soft); font-size: 12px; margin-left: auto; }
.hbtn {
  border: 1px solid #2e2a24; background: var(--panel); color: var(--soft);
  padding: 6px 11px; border-radius: 6px; font-size: 12px; cursor: pointer;
}
.hbtn:hover { color: var(--bright); border-color: #6b4b2b; }

/* ── messages ───────────────────────────────────────────────────── */
#messages { flex: 1; overflow-y: auto; padding: 20px 0; scroll-behavior: smooth; }
.msg { display: flex; flex-direction: column; padding: 12px 24px; line-height: 1.6; gap: 4px; }
.msg.user      { background: var(--user-bg); border-left: 2px solid #7c2d12; }
.msg.assistant { border-left: 2px solid transparent; }
.msg .role  { font-size: 11px; color: var(--soft); text-transform: uppercase;
              letter-spacing: .05em; margin-bottom: 4px; }
.msg .body  { white-space: pre-wrap; word-break: break-word; color: var(--text); }
.msg.assistant .body { color: var(--bright); }

.tool-line { font-size: 12px; color: var(--soft); display: flex; align-items: center; gap: 6px; padding: 2px 0; }
.tool-line.ok   .tdot { background: var(--ok); }
.tool-line.fail .tdot { background: var(--err); }
.tool-line.run  .tdot { background: var(--accent); animation: pulse 1s infinite; }
.tdot { width: 5px; height: 5px; border-radius: 50%; background: var(--soft); flex-shrink: 0; }

.cursor { display: inline-block; width: 2px; height: 1em; background: var(--accent);
          animation: blink .7s step-end infinite; vertical-align: text-bottom; margin-left: 1px; }
@keyframes blink { 50%{opacity:0} }

/* ── permission dialog ───────────────────────────────────────────── */
#perm-overlay {
  display: none; position: fixed; inset: 0;
  background: #0009; align-items: center; justify-content: center; z-index: 100;
}
#perm-overlay.show { display: flex; }
#perm-box {
  background: var(--panel); border: 1px solid #3a3530; border-radius: 10px;
  padding: 24px; max-width: 420px; width: 90%;
}
#perm-box h3 { color: var(--bright); margin-bottom: 8px; font-size: 15px; }
#perm-tool   { color: var(--accent); font-size: 13px; margin-bottom: 6px; }
#perm-reason { color: var(--soft); font-size: 12px; margin-bottom: 18px; line-height: 1.5; }
.perm-btns   { display: flex; gap: 10px; }
.perm-btns button {
  flex: 1; padding: 9px; border-radius: 7px; font-size: 13px;
  cursor: pointer; border: none;
}
#perm-approve { background: var(--accent); color: #1a0e00; font-weight: 600; }
#perm-deny    { background: #2e2520; color: var(--soft); }
#perm-approve:hover { background: #b45309; }
#perm-deny:hover    { color: var(--bright); }

/* ── upload preview ──────────────────────────────────────────────── */
#upload-preview {
  display: none; padding: 8px 18px 0;
  font-size: 12px; color: var(--soft);
  background: var(--panel); border-top: 1px solid var(--line);
  gap: 8px; flex-wrap: wrap;
}
#upload-preview.show { display: flex; }
.upload-chip {
  background: #211d19; border: 1px solid #3a3530; border-radius: 5px;
  padding: 4px 8px; display: flex; align-items: center; gap: 6px;
}
.upload-chip button {
  background: none; border: none; color: var(--soft); cursor: pointer;
  font-size: 14px; line-height: 1; padding: 0 2px;
}
.upload-chip button:hover { color: var(--err); }

/* ── footer ──────────────────────────────────────────────────────── */
#footer {
  border-top: 1px solid var(--line); padding: 12px 18px;
  display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0;
  background: var(--panel);
}
#input {
  flex: 1; background: #1e1a16; border: 1px solid #2e2a24; color: var(--bright);
  border-radius: 8px; padding: 10px 14px; font-size: 14px; font-family: inherit;
  resize: none; min-height: 44px; max-height: 200px; outline: none; line-height: 1.5;
}
#input:focus { border-color: #6b4b2b; }
#btn-upload {
  background: none; border: 1px solid #2e2a24; border-radius: 8px;
  color: var(--soft); padding: 10px 12px; cursor: pointer; flex-shrink: 0; align-self: flex-end;
}
#btn-upload:hover { color: var(--bright); border-color: #6b4b2b; }
#btn-send {
  background: var(--accent); color: #1a0e00; border: none; border-radius: 8px;
  padding: 10px 16px; font-size: 14px; font-weight: 600; cursor: pointer;
  flex-shrink: 0; align-self: flex-end;
}
#btn-send:disabled { opacity: .4; cursor: default; }
#btn-send:not(:disabled):hover { background: #b45309; }
#btn-stop {
  display: none; background: #3a1a1a; color: var(--err); border: 1px solid #5a2a2a;
  border-radius: 8px; padding: 10px 14px; font-size: 13px; cursor: pointer;
  flex-shrink: 0; align-self: flex-end;
}
#btn-stop.show { display: block; }
#btn-stop:hover { background: #5a1a1a; }
</style>
</head>
<body>

<!-- permission dialog -->
<div id="perm-overlay">
  <div id="perm-box">
    <h3>Autorisation requise</h3>
    <div id="perm-tool"></div>
    <div id="perm-reason"></div>
    <div class="perm-btns">
      <button id="perm-approve" onclick="answerPerm(true)">Autoriser</button>
      <button id="perm-deny"    onclick="answerPerm(false)">Refuser</button>
    </div>
  </div>
</div>

<div id="header">
  <div id="status"></div>
  <span id="agent-label">Marius</span>
  <span id="model-label"></span>
  <button class="hbtn" onclick="newConv()">Nouvelle conversation</button>
</div>

<div id="upload-preview"></div>
<div id="messages"></div>

<div id="footer">
  <input type="file" id="file-input" multiple accept="image/*,.pdf,.txt,.md,.py,.js,.ts,.json,.csv" style="display:none" onchange="onFiles(this)">
  <button id="btn-upload" title="Joindre un fichier" onclick="document.getElementById('file-input').click()">📎</button>
  <textarea id="input" placeholder="Envoie un message…" rows="1"
    onkeydown="onKey(event)" oninput="autoResize(this)"></textarea>
  <button id="btn-stop" onclick="sendStop()">⏹ Stop</button>
  <button id="btn-send" onclick="send()">Envoyer</button>
</div>

<script>
const SESSION_ID = 'web-' + Math.random().toString(36).slice(2, 10);
let busy = false;
let pendingUploads = [];   // [{name, path}]
let pendingPermId = null;
let es = null;

// ── init ──────────────────────────────────────────────────────────
async function init() {
  try {
    const r = await fetch('/health');
    const d = await r.json();
    if (d.ok) {
      document.getElementById('status').className = 'on';
      document.getElementById('agent-label').textContent = d.agent || 'Marius';
    }
  } catch { /* gateway not reachable */ }
  openSSE();
}

// ── SSE (connexion persistante) ───────────────────────────────────
function openSSE() {
  es = new EventSource(`/api/stream?session_id=${SESSION_ID}`);
  es.onmessage = (e) => {
    const ev = JSON.parse(e.data);
    handleSSE(ev);
  };
  es.onerror = () => {
    setBusy(false);
    document.getElementById('status').className = '';
    // Reconnect after 3s
    setTimeout(openSSE, 3000);
  };
}

function handleSSE(ev) {
  if (ev.type === 'text_delta') {
    appendDelta(ev.delta);
  } else if (ev.type === 'done_turn') {
    finishTurn();
  } else if (ev.type === 'tool_start') {
    addToolLine(ev.tool, ev.target, 'run');
  } else if (ev.type === 'tool_result') {
    updateToolLine(ev.tool, ev.ok ? 'ok' : 'fail');
  } else if (ev.type === 'permission_request') {
    showPermission(ev);
  } else if (ev.type === 'error') {
    finishTurn();
    appendError(ev.error);
  } else if (ev.type === 'status') {
    appendStatus(ev.message);
  } else if (ev.type === 'disconnected') {
    setBusy(false);
    document.getElementById('status').className = '';
  }
}

// ── send ──────────────────────────────────────────────────────────
let _cursorEl = null;
let _activeMsg = null;

async function send() {
  const inp = document.getElementById('input');
  let text = inp.value.trim();
  if (!text && pendingUploads.length === 0) return;
  if (busy) return;

  // Inject upload paths
  if (pendingUploads.length > 0) {
    const paths = pendingUploads.map(u => `[fichier joint : ${u.path}]`).join('\n');
    text = text ? `${text}\n\n${paths}` : paths;
    pendingUploads = [];
    updateUploadPreview();
  }

  inp.value = '';
  autoResize(inp);
  setBusy(true);

  appendMsg('user', text);
  _activeMsg = appendMsg('assistant', '');
  _cursorEl = document.createElement('span');
  _cursorEl.className = 'cursor';
  _activeMsg.querySelector('.body').appendChild(_cursorEl);

  await fetch('/api/message', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({text, session_id: SESSION_ID}),
  });
  // Response arrives via SSE
}

function appendDelta(delta) {
  if (!_activeMsg) return;
  const body = _activeMsg.querySelector('.body');
  if (_cursorEl) _cursorEl.remove();
  body.textContent += delta;
  if (_cursorEl) body.appendChild(_cursorEl);
  scrollBottom();
}

function finishTurn() {
  if (_cursorEl) _cursorEl.remove();
  _cursorEl = null;
  _activeMsg = null;
  setBusy(false);
}

function appendError(msg) {
  if (_activeMsg) {
    const body = _activeMsg.querySelector('.body');
    if (_cursorEl) _cursorEl.remove();
    body.textContent += `\n[Erreur : ${msg}]`;
  }
}

function appendStatus(msg) {
  if (_activeMsg) {
    const line = document.createElement('div');
    line.className = 'tool-line';
    line.style.color = 'var(--soft)';
    line.textContent = msg;
    _activeMsg.appendChild(line);
    scrollBottom();
  }
}

// ── /stop ─────────────────────────────────────────────────────────
async function sendStop() {
  await fetch('/api/command', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({cmd: '/stop'}),
  });
}

// ── /new ──────────────────────────────────────────────────────────
async function newConv() {
  await fetch('/api/command', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({cmd: '/new'}),
  });
  document.getElementById('messages').innerHTML = '';
  _activeMsg = null;
  _cursorEl = null;
}

// ── permissions ───────────────────────────────────────────────────
function showPermission(ev) {
  pendingPermId = ev.request_id;
  document.getElementById('perm-tool').textContent = ev.tool || '';
  document.getElementById('perm-reason').textContent = ev.reason || '';
  document.getElementById('perm-overlay').className = 'show';
}

async function answerPerm(approved) {
  document.getElementById('perm-overlay').className = '';
  if (!pendingPermId) return;
  await fetch('/api/permission', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({request_id: pendingPermId, approved}),
  });
  pendingPermId = null;
}

// ── uploads ───────────────────────────────────────────────────────
async function onFiles(input) {
  for (const file of Array.from(input.files)) {
    const data = await toBase64(file);
    try {
      const r = await fetch('/api/upload', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({filename: file.name, data}),
      });
      const d = await r.json();
      if (d.ok) {
        pendingUploads.push({name: d.name, path: d.path});
      }
    } catch { /* ignore upload errors */ }
  }
  input.value = '';
  updateUploadPreview();
}

function updateUploadPreview() {
  const el = document.getElementById('upload-preview');
  el.innerHTML = '';
  if (pendingUploads.length === 0) { el.className = ''; return; }
  el.className = 'show';
  pendingUploads.forEach((u, i) => {
    const chip = document.createElement('div');
    chip.className = 'upload-chip';
    chip.innerHTML = `<span>${escHtml(u.name)}</span>
      <button onclick="removeUpload(${i})">×</button>`;
    el.appendChild(chip);
  });
}

function removeUpload(i) {
  pendingUploads.splice(i, 1);
  updateUploadPreview();
}

function toBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result.split(',')[1]);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

// ── tool activity ─────────────────────────────────────────────────
const _toolLines = {};   // tool → last element

function addToolLine(tool, target, state) {
  if (!_activeMsg) return;
  const line = document.createElement('div');
  line.className = `tool-line ${state}`;
  const label = target ? `${tool} — ${target.slice(0, 60)}` : tool;
  line.innerHTML = `<span class="tdot"></span><span>${escHtml(label)}</span>`;
  _toolLines[tool] = line;
  _activeMsg.appendChild(line);
  scrollBottom();
}

function updateToolLine(tool, state) {
  const line = _toolLines[tool];
  if (line) line.className = `tool-line ${state}`;
}

// ── helpers ───────────────────────────────────────────────────────
function appendMsg(role, text) {
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  el.innerHTML = `<div class="role">${role === 'user' ? 'Vous' : 'Marius'}</div>
                  <div class="body">${escHtml(text)}</div>`;
  document.getElementById('messages').appendChild(el);
  scrollBottom();
  return el;
}

function setBusy(val) {
  busy = val;
  document.getElementById('status').className = val ? 'on busy' : 'on';
  document.getElementById('btn-send').disabled = val;
  document.getElementById('input').disabled = val;
  document.getElementById('btn-stop').className = val ? 'show' : '';
  if (!val) Object.keys(_toolLines).forEach(k => delete _toolLines[k]);
}

function scrollBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

init();
</script>
</body>
</html>
