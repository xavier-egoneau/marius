<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Marius</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  color-scheme: dark;
  --bg:      #141210;
  --panel:   #1a1714;
  --line:    #2a2520;
  --soft:    #8f8276;
  --text:    #ddd8d0;
  --bright:  #f0ebe3;
  --accent:  #d97706;
  --user-bg: #1f1510;
}
body {
  font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  font-size: 14px;
}

/* ── header ─────────────────────────────────────────────────────── */
#header {
  min-height: 50px;
  padding: 10px 18px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
#status {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #3a3530;
  transition: background .3s, box-shadow .3s;
  flex-shrink: 0;
}
#status.on   { background: var(--accent); box-shadow: 0 0 5px #d9770655; }
#status.busy { animation: pulse 1s ease-in-out infinite; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: .4; }
}
#agent-label { color: var(--soft); font-size: 12px; }
#model-label  { color: var(--soft); font-size: 12px; margin-left: auto; }
#btn-new {
  border: 1px solid #2e2a24;
  background: var(--panel);
  color: var(--soft);
  padding: 6px 11px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
}
#btn-new:hover { color: var(--bright); border-color: #6b4b2b; }

/* ── messages ───────────────────────────────────────────────────── */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 0;
  scroll-behavior: smooth;
}
.msg {
  display: flex;
  flex-direction: column;
  padding: 12px 24px;
  line-height: 1.6;
  gap: 4px;
}
.msg.user   { background: var(--user-bg); border-left: 2px solid #7c2d12; }
.msg.assistant { border-left: 2px solid transparent; }
.msg .role  { font-size: 11px; color: var(--soft); text-transform: uppercase;
              letter-spacing: .05em; margin-bottom: 4px; }
.msg .body  { white-space: pre-wrap; word-break: break-word; color: var(--text); }
.msg.assistant .body { color: var(--bright); }

/* tool activity */
.tool-line {
  font-size: 12px;
  color: var(--soft);
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 2px 0;
}
.tool-line.ok   .tool-dot { background: #22c55e; }
.tool-line.fail .tool-dot { background: #ef4444; }
.tool-line.run  .tool-dot { background: var(--accent); animation: pulse 1s infinite; }
.tool-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--soft); flex-shrink: 0; }

/* streaming cursor */
.cursor { display: inline-block; width: 2px; height: 1em;
          background: var(--accent); animation: blink .7s step-end infinite;
          vertical-align: text-bottom; margin-left: 1px; }
@keyframes blink { 50% { opacity: 0; } }

/* ── input ──────────────────────────────────────────────────────── */
#footer {
  border-top: 1px solid var(--line);
  padding: 12px 18px;
  display: flex;
  gap: 10px;
  align-items: flex-end;
  flex-shrink: 0;
  background: var(--panel);
}
#input {
  flex: 1;
  background: #1e1a16;
  border: 1px solid #2e2a24;
  color: var(--bright);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 14px;
  font-family: inherit;
  resize: none;
  min-height: 44px;
  max-height: 200px;
  outline: none;
  line-height: 1.5;
}
#input:focus { border-color: #6b4b2b; }
#btn-send {
  background: var(--accent);
  color: #1a0e00;
  border: none;
  border-radius: 8px;
  padding: 10px 16px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  flex-shrink: 0;
  align-self: flex-end;
}
#btn-send:disabled { opacity: .4; cursor: default; }
#btn-send:not(:disabled):hover { background: #b45309; }
</style>
</head>
<body>

<div id="header">
  <div id="status"></div>
  <span id="agent-label">Marius</span>
  <span id="model-label">—</span>
  <button id="btn-new" onclick="newConversation()">Nouvelle conversation</button>
</div>

<div id="messages"></div>

<div id="footer">
  <textarea id="input" placeholder="Envoie un message…" rows="1"
    onkeydown="onKey(event)" oninput="autoResize(this)"></textarea>
  <button id="btn-send" onclick="send()">Envoyer</button>
</div>

<script>
const SESSION_ID = 'web-' + Math.random().toString(36).slice(2, 10);
let busy = false;

// ── init ──────────────────────────────────────────────────────────
async function init() {
  try {
    const r = await fetch('/health');
    const d = await r.json();
    document.getElementById('status').className = 'on';
    document.getElementById('agent-label').textContent = d.agent || 'Marius';
    document.getElementById('model-label').textContent = d.model || '';
  } catch {
    document.getElementById('status').className = '';
  }
}
init();

// ── send ──────────────────────────────────────────────────────────
async function send() {
  const inp = document.getElementById('input');
  const text = inp.value.trim();
  if (!text || busy) return;

  inp.value = '';
  autoResize(inp);
  setBusy(true);

  appendMsg('user', text);
  const aMsg = appendMsg('assistant', '');
  const bodyEl = aMsg.querySelector('.body');
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  bodyEl.appendChild(cursor);

  // Start turn
  await fetch('/api/message', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({text, session_id: SESSION_ID}),
  });

  // Stream SSE
  const es = new EventSource(`/api/stream?session_id=${SESSION_ID}`);
  es.onmessage = (e) => {
    const ev = JSON.parse(e.data);
    if (ev.done) {
      cursor.remove();
      es.close();
      setBusy(false);
      return;
    }
    if (ev.type === 'text_delta') {
      cursor.remove();
      bodyEl.textContent += ev.delta;
      bodyEl.appendChild(cursor);
      scrollBottom();
    } else if (ev.type === 'tool_start') {
      addToolLine(aMsg, ev.tool, ev.target, 'run');
    } else if (ev.type === 'tool_result') {
      updateToolLine(aMsg, ev.tool, ev.ok ? 'ok' : 'fail');
    } else if (ev.type === 'error') {
      cursor.remove();
      bodyEl.textContent += `\n[Erreur : ${ev.error}]`;
      es.close();
      setBusy(false);
    }
  };
  es.onerror = () => { cursor.remove(); es.close(); setBusy(false); };
}

// ── new conversation ──────────────────────────────────────────────
async function newConversation() {
  await fetch(`/api/session?session_id=${SESSION_ID}`, {method: 'DELETE'});
  document.getElementById('messages').innerHTML = '';
}

// ── helpers ───────────────────────────────────────────────────────
function appendMsg(role, text) {
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  el.innerHTML = `<div class="role">${role === 'user' ? 'Vous' : 'Marius'}</div>
                  <div class="body">${escHtml(text)}</div>`;
  document.getElementById('messages').appendChild(el);
  scrollBottom();
  return el;
}

function addToolLine(msgEl, tool, target, state) {
  const id = `tool-${tool}-${Date.now()}`;
  const line = document.createElement('div');
  line.className = `tool-line ${state}`;
  line.id = id;
  line.dataset.tool = tool;
  const label = target ? `${tool} — ${target.slice(0, 60)}` : tool;
  line.innerHTML = `<span class="tool-dot"></span><span>${escHtml(label)}</span>`;
  msgEl.appendChild(line);
  scrollBottom();
}

function updateToolLine(msgEl, tool, state) {
  const lines = msgEl.querySelectorAll(`.tool-line[data-tool="${tool}"]`);
  const line = lines[lines.length - 1];
  if (line) line.className = `tool-line ${state}`;
}

function setBusy(val) {
  busy = val;
  document.getElementById('status').className = val ? 'on busy' : 'on';
  document.getElementById('btn-send').disabled = val;
  document.getElementById('input').disabled = val;
}

function scrollBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}
</script>
</body>
</html>
